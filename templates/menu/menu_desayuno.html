{% extends 'base.html' %}

{% block title %}Menú Desayuno{% endblock %}

{% block content %}
<style>
    .page-header-desayuno {
        background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
        color: white;
        padding: 2rem 1.5rem;
        border-radius: 1rem;
        margin-bottom: 2rem;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
    }
    .date-picker-glass {
        background: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        border-radius: 0.5rem;
    }
    .date-picker-glass::placeholder, .date-picker-glass { color: white; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
</style>

<div class="container py-4">
    <div class="page-header-desayuno d-flex flex-wrap align-items-center justify-content-between gap-3">
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-egg-fried me-2"></i> Menú de Desayuno
            </h2>
            <p class="m-0 opacity-75 small">Configura el desayuno para la fecha seleccionada</p>
        </div>
        <form method="get" action="{% url 'menu:desayuno' %}" class="d-flex align-items-center gap-2 bg-white bg-opacity-10 p-2 rounded-3">
            <input type="date" name="fecha" class="form-control date-picker-glass border-0" value="{{ fecha }}" />
            <button class="btn btn-light text-warning fw-bold shadow-sm" type="submit">
                <i class="bi bi-search"></i>
            </button>
        </form>
    </div>

    <div class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                <input type="hidden" name="fecha" value="{{ fecha }}">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Platos principales</label>
                    <textarea name="desayuno_principales" class="form-control" rows="2" placeholder="Ej: Calentado, Huevos pericos, Arepa con queso">{{ menu.principales_raw }}</textarea>
                    <div class="form-text">Escribe una lista separada por comas.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Bebidas</label>
                    <textarea name="desayuno_bebidas" class="form-control" rows="2" placeholder="Ej: Café, Chocolate, Jugo de naranja">{{ menu.bebidas_raw }}</textarea>
                    <div class="form-text">Lista separada por comas.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Caldos</label>
                    <textarea name="caldos" class="form-control" rows="2" placeholder="Ej: Caldo de costilla, Caldo de papa">{{ menu.caldos_raw }}</textarea>
                    <div class="form-text">Lista separada por comas.</div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Acompañante</label>
                    <input type="text" name="desayuno_acompanante" class="form-control" value="{{ menu.acompanante }}" placeholder="Ej: Pan o arepa">
                </div>

                <div class="mb-3 col-md-4">
                    <label class="form-label fw-semibold">Precio desayuno</label>
                    <input type="number" step="0.01" name="precio_desayuno" class="form-control" value="{{ menu.precio_desayuno }}">
                </div>

                <button type="submit" class="btn btn-warning px-4">
                    <i class="bi bi-save me-1"></i> Guardar desayuno
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
