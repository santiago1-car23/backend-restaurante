{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="mb-4">
        <h2 class="fw-bold mb-0">{{ titulo }}</h2>
        <small class="text-muted">Registra entradas, salidas o ajustes</small>
    </div>

    <form method="post" class="card border-0 shadow-sm rounded-4 p-4">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Ingrediente</label>
                {{ form.ingrediente }}
            </div>
            <div class="col-md-3">
                <label class="form-label">Tipo</label>
                {{ form.tipo }}
            </div>
            <div class="col-md-3">
                <label class="form-label">Cantidad</label>
                {{ form.cantidad }}
            </div>
            <div class="col-12">
                <label class="form-label">Motivo</label>
                {{ form.motivo }}
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-4">
            <a href="{% url 'inventario:movimientos' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
            <button type="submit" class="btn btn-primary px-4">Guardar</button>
        </div>
    </form>
</div>
{% endblock %}
